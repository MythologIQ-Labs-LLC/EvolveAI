<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolveAI Setup Wizard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
        }

        .content-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .step-content {
            flex: 1;
            overflow-y: auto;
        }

        .step-content h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .step-content h3 {
            color: #333;
            margin: 20px 0 10px 0;
            font-size: 20px;
        }

        .step-content h4 {
            color: #555;
            margin: 15px 0 8px 0;
            font-size: 16px;
        }

        .step-content p {
            margin-bottom: 15px;
            color: #666;
        }

        .step-content ul, .step-content ol {
            margin: 15px 0;
            padding-left: 20px;
        }

        .step-content li {
            margin-bottom: 8px;
            color: #666;
        }

        .features-list ul {
            list-style: none;
            padding: 0;
        }

        .features-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .features-list li:last-child {
            border-bottom: none;
        }

        .api-key-input {
            margin: 20px 0;
        }

        .api-key-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .api-key-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .api-key-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .test-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .test-button:hover {
            background: #5a6fd8;
        }

        .ollama-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .option {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .option h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .primary-button, .secondary-button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }

        .primary-button {
            background: #667eea;
            color: white;
        }

        .primary-button:hover {
            background: #5a6fd8;
        }

        .secondary-button {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #ddd;
        }

        .secondary-button:hover {
            background: #e9ecef;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .model-card {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .model-card h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .size {
            background: #f8f9fa;
            color: #666;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .option-group {
            margin: 25px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            margin: 15px 0;
        }

        .option-item input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 2px;
            transform: scale(1.2);
        }

        .option-item label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .option-item p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #666;
        }

        .next-steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .step-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .step-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .link-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .link-button:hover {
            background: #5a6fd8;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-button {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #ddd;
        }

        .back-button:hover:not(:disabled) {
            background: #e9ecef;
        }

        .next-button {
            background: #667eea;
            color: white;
        }

        .next-button:hover:not(:disabled) {
            background: #5a6fd8;
        }

        .finish-button {
            background: #28a745;
            color: white;
        }

        .finish-button:hover:not(:disabled) {
            background: #218838;
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .progress-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 10px;
            position: relative;
        }

        .progress-step.active {
            background: #667eea;
            color: white;
        }

        .progress-step.completed {
            background: #28a745;
            color: white;
        }

        .progress-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 2px;
            background: #ddd;
        }

        .progress-step.completed:not(:last-child)::after {
            background: #28a745;
        }

        .skip-option {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }

        .skip-option p {
            margin: 0;
            color: #666;
            font-style: italic;
        }

        .api-key-info, .privacy-benefits, .privacy-info, .support-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .api-key-info ul, .privacy-benefits ul, .privacy-info ul, .support-info ul {
            list-style: none;
            padding: 0;
        }

        .api-key-info li, .privacy-benefits li, .privacy-info li, .support-info li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .api-key-info li:last-child, .privacy-benefits li:last-child, .privacy-info li:last-child, .support-info li:last-child {
            border-bottom: none;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">EvolveAI Setup</h1>
            <p class="subtitle">Advanced AI Desktop Application</p>
        </div>

        <div class="content-card">
            <div class="progress-bar">
                <div class="progress-step active" id="step-0">1</div>
                <div class="progress-step" id="step-1">2</div>
                <div class="progress-step" id="step-2">3</div>
                <div class="progress-step" id="step-3">4</div>
                <div class="progress-step" id="step-4">5</div>
            </div>

            <div class="step-content" id="step-content">
                <!-- Content will be dynamically loaded -->
            </div>

            <div class="navigation">
                <button class="nav-button back-button" id="back-button" onclick="previousStep()" disabled>Back</button>
                <button class="nav-button next-button" id="next-button" onclick="nextStep()">Next</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const totalSteps = 5;

        // Initialize the wizard
        document.addEventListener('DOMContentLoaded', function() {
            updateProgressBar();
        });

        function updateProgressBar() {
            for (let i = 0; i < totalSteps; i++) {
                const step = document.getElementById(`step-${i}`);
                if (i < currentStep) {
                    step.classList.remove('active');
                    step.classList.add('completed');
                } else if (i === currentStep) {
                    step.classList.remove('completed');
                    step.classList.add('active');
                } else {
                    step.classList.remove('active', 'completed');
                }
            }

            // Update navigation buttons
            const backButton = document.getElementById('back-button');
            const nextButton = document.getElementById('next-button');

            backButton.disabled = currentStep === 0;
            
            if (currentStep === totalSteps - 1) {
                nextButton.textContent = 'Finish';
                nextButton.className = 'nav-button finish-button';
            } else {
                nextButton.textContent = 'Next';
                nextButton.className = 'nav-button next-button';
            }
        }

        function nextStep() {
            if (currentStep < totalSteps - 1) {
                currentStep++;
                updateProgressBar();
                // The content will be updated by the main process
            } else {
                // Finish setup
                window.electronAPI.finishSetup();
            }
        }

        function previousStep() {
            if (currentStep > 0) {
                currentStep--;
                updateProgressBar();
                // The content will be updated by the main process
            }
        }

        function testApiKey() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                showMessage('Please enter an API key first.', 'error');
                return;
            }

            window.electronAPI.testApiKey(apiKey).then(result => {
                if (result.success) {
                    showMessage(result.message, 'success');
                } else {
                    showMessage(result.message, 'error');
                }
            });
        }

        function showMessage(message, type) {
            const existingMessage = document.querySelector('.success-message, .error-message');
            if (existingMessage) {
                existingMessage.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = message;

            const apiKeyInput = document.getElementById('apiKey');
            apiKeyInput.parentNode.insertBefore(messageDiv, apiKeyInput.nextSibling);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function openGoogleAIStudio() {
            window.electronAPI.openExternal('https://makersuite.google.com/app/apikey');
        }

        function installOllama() {
            window.electronAPI.installOllama();
        }

        function openOllamaWebsite() {
            window.electronAPI.openExternal('https://ollama.ai');
        }

        function openDocumentation() {
            window.electronAPI.openExternal('https://github.com/WulfForge/EvolveAI/blob/main/README.md');
        }

        function openGitHub() {
            window.electronAPI.openExternal('https://github.com/WulfForge/EvolveAI');
        }

        function openIssues() {
            window.electronAPI.openExternal('https://github.com/WulfForge/EvolveAI/issues');
        }

        function openDiscord() {
            window.electronAPI.openExternal('https://discord.gg/evolveai');
        }

        // Listen for step updates from main process
        window.electronAPI.onStepUpdate((data) => {
            currentStep = data.step;
            document.getElementById('step-content').innerHTML = data.content;
            updateProgressBar();
        });
    </script>
</body>
</html>
