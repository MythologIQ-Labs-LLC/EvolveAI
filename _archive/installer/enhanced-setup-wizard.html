<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolveAI Enhanced Setup Wizard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #ffd700;
            color: #333;
            transform: scale(1.1);
        }

        .step.completed {
            background: #4CAF50;
            color: white;
        }

        .content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            flex: 1;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .welcome-content {
            text-align: center;
        }

        .welcome-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }

        .feature-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .personality-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .ai-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .ai-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .personality-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .trait-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e1e5e9;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trait-checkbox:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .trait-checkbox input[type="checkbox"] {
            margin: 0;
        }

        .use-case-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .use-case-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .use-case-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .use-case-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .use-case-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .voice-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .voice-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .voice-section h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .voice-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .voice-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e1e5e9;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .voice-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .voice-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .installation-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .installation-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .installation-section h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .model-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e1e5e9;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .model-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .model-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .model-card h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .model-card .size {
            color: #666;
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e1e5e9;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .finish-content {
            text-align: center;
        }

        .finish-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
        }

        .next-steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .step-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .step-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .system-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .system-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .info-item {
            text-align: center;
        }

        .info-item .label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-weight: 600;
            color: #333;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">E</div>
            <h1 class="title" id="step-title">Welcome to EvolveAI</h1>
            <p class="subtitle" id="step-subtitle">Let's configure your AI experience</p>
            
            <div class="step-indicator">
                <div class="step active" data-step="0">1</div>
                <div class="step" data-step="1">2</div>
                <div class="step" data-step="2">3</div>
                <div class="step" data-step="3">4</div>
                <div class="step" data-step="4">5</div>
                <div class="step" data-step="5">6</div>
            </div>
        </div>

        <div class="content" id="content">
            <!-- Content will be dynamically loaded -->
        </div>

        <div class="navigation">
            <button class="btn btn-secondary" id="prev-btn" onclick="previousStep()">Previous</button>
            <button class="btn btn-primary" id="next-btn" onclick="nextStep()">Next</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let config = {
            geminiPersonality: {
                name: 'Claude',
                traits: ['helpful', 'honest', 'harmless'],
                expertise: ['general'],
                communicationStyle: 'professional',
                background: 'AI assistant focused on being helpful, harmless, and honest.'
            },
            localLLMPersonality: {
                name: 'LocalAI',
                traits: ['privacy-focused', 'efficient'],
                expertise: ['local processing'],
                communicationStyle: 'direct',
                background: 'Local AI model for privacy-focused interactions.'
            },
            primaryUseCase: 'general',
            voiceEnabled: false,
            voiceProvider: 'local',
            selectedModels: []
        };

        // Step content templates
        const stepContent = {
            welcome: `
                <div class="welcome-content">
                    <h2>🎉 Welcome to EvolveAI!</h2>
                    <p>You're about to experience the most advanced AI desktop application available. Let's configure your personalized AI experience.</p>
                    
                    <div class="system-info">
                        <h3>System Information</h3>
                        <div class="info-grid" id="system-info-grid">
                            <!-- System info will be populated -->
                        </div>
                    </div>
                    
                    <div class="features-grid">
                        <div class="feature-card">
                            <h3>🤖 Hybrid AI</h3>
                            <p>Google AI Studio + Local LLMs for maximum flexibility</p>
                        </div>
                        <div class="feature-card">
                            <h3>🎭 Personalized</h3>
                            <p>Customize AI personalities and communication styles</p>
                        </div>
                        <div class="feature-card">
                            <h3>🎤 Voice Ready</h3>
                            <p>Natural voice interaction with your AI assistants</p>
                        </div>
                        <div class="feature-card">
                            <h3>🔒 Privacy First</h3>
                            <p>Local processing options for sensitive data</p>
                        </div>
                    </div>
                </div>
            `,
            
            personality: `
                <div class="personality-content">
                    <div class="ai-section">
                        <h3>🤖 Google AI Studio Personality</h3>
                        <div class="personality-form">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="gemini-name" value="${config.geminiPersonality.name}" onchange="updateGeminiPersonality()">
                            </div>
                            <div class="form-group">
                                <label>Communication Style</label>
                                <select id="gemini-style" onchange="updateGeminiPersonality()">
                                    <option value="professional">Professional</option>
                                    <option value="friendly">Friendly</option>
                                    <option value="casual">Casual</option>
                                    <option value="formal">Formal</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Traits</label>
                                <div class="traits-grid">
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="helpful" checked onchange="updateGeminiTraits()">
                                        Helpful
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="honest" checked onchange="updateGeminiTraits()">
                                        Honest
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="creative" onchange="updateGeminiTraits()">
                                        Creative
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="analytical" onchange="updateGeminiTraits()">
                                        Analytical
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="empathetic" onchange="updateGeminiTraits()">
                                        Empathetic
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="efficient" onchange="updateGeminiTraits()">
                                        Efficient
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Background/Description</label>
                                <textarea id="gemini-background" rows="3" onchange="updateGeminiPersonality()">${config.geminiPersonality.background}</textarea>
                            </div>
                        </div>
                    </div>
                    
                    <div class="ai-section">
                        <h3>🏠 Local AI Personality</h3>
                        <div class="personality-form">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="local-name" value="${config.localLLMPersonality.name}" onchange="updateLocalPersonality()">
                            </div>
                            <div class="form-group">
                                <label>Communication Style</label>
                                <select id="local-style" onchange="updateLocalPersonality()">
                                    <option value="direct">Direct</option>
                                    <option value="detailed">Detailed</option>
                                    <option value="concise">Concise</option>
                                    <option value="technical">Technical</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Traits</label>
                                <div class="traits-grid">
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="privacy-focused" checked onchange="updateLocalTraits()">
                                        Privacy-Focused
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="efficient" checked onchange="updateLocalTraits()">
                                        Efficient
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="reliable" onchange="updateLocalTraits()">
                                        Reliable
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="secure" onchange="updateLocalTraits()">
                                        Secure
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="analytical" onchange="updateLocalTraits()">
                                        Analytical
                                    </label>
                                    <label class="trait-checkbox">
                                        <input type="checkbox" value="precise" onchange="updateLocalTraits()">
                                        Precise
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Background/Description</label>
                                <textarea id="local-background" rows="3" onchange="updateLocalPersonality()">${config.localLLMPersonality.background}</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            useCase: `
                <div class="use-case-content">
                    <div class="use-case-card" data-use-case="general" onclick="selectUseCase('general')">
                        <h3>🎯 General Assistant</h3>
                        <p>Help with everyday tasks, questions, and general productivity</p>
                    </div>
                    <div class="use-case-card" data-use-case="coding" onclick="selectUseCase('coding')">
                        <h3>💻 Programming & Development</h3>
                        <p>Code assistance, debugging, and software development tasks</p>
                    </div>
                    <div class="use-case-card" data-use-case="writing" onclick="selectUseCase('writing')">
                        <h3>✍️ Writing & Content</h3>
                        <p>Writing assistance, content creation, and editing</p>
                    </div>
                    <div class="use-case-card" data-use-case="research" onclick="selectUseCase('research')">
                        <h3>🔬 Research & Analysis</h3>
                        <p>Data analysis, research tasks, and information gathering</p>
                    </div>
                    <div class="use-case-card" data-use-case="creative" onclick="selectUseCase('creative')">
                        <h3>🎨 Creative Projects</h3>
                        <p>Creative writing, brainstorming, and artistic projects</p>
                    </div>
                    <div class="use-case-card" data-use-case="business" onclick="selectUseCase('business')">
                        <h3>💼 Business & Professional</h3>
                        <p>Business tasks, presentations, and professional work</p>
                    </div>
                </div>
            `,
            
            voice: `
                <div class="voice-content">
                    <div class="voice-section">
                        <h3>🎤 Voice Interaction</h3>
                        <div class="voice-options">
                            <label class="voice-option" onclick="selectVoiceProvider('local')">
                                <input type="radio" name="voice-provider" value="local" checked>
                                <div>
                                    <strong>Local Voice (Recommended)</strong>
                                    <p>Privacy-focused, works offline, no data sent to external services</p>
                                </div>
                            </label>
                            <label class="voice-option" onclick="selectVoiceProvider('google')">
                                <input type="radio" name="voice-provider" value="google">
                                <div>
                                    <strong>Google Cloud TTS</strong>
                                    <p>High-quality voices, requires internet connection</p>
                                </div>
                            </label>
                            <label class="voice-option" onclick="selectVoiceProvider('azure')">
                                <input type="radio" name="voice-provider" value="azure">
                                <div>
                                    <strong>Azure Speech Services</strong>
                                    <p>Enterprise-grade voice synthesis</p>
                                </div>
                            </label>
                        </div>
                        
                        <div class="form-group" style="margin-top: 20px;">
                            <label>Voice Language</label>
                            <select id="voice-language">
                                <option value="en-US">English (US)</option>
                                <option value="en-GB">English (UK)</option>
                                <option value="es-ES">Spanish</option>
                                <option value="fr-FR">French</option>
                                <option value="de-DE">German</option>
                                <option value="it-IT">Italian</option>
                                <option value="pt-BR">Portuguese (Brazil)</option>
                                <option value="ja-JP">Japanese</option>
                                <option value="ko-KR">Korean</option>
                                <option value="zh-CN">Chinese (Simplified)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Voice Speed</label>
                            <input type="range" id="voice-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                            <span id="speed-value">1.0x</span>
                        </div>
                        
                        <div class="form-group">
                            <label>Voice Volume</label>
                            <input type="range" id="voice-volume" min="0.1" max="1.0" step="0.1" value="0.8">
                            <span id="volume-value">80%</span>
                        </div>
                        
                        <button class="btn btn-primary" onclick="testVoice()" style="margin-top: 20px;">
                            🎵 Test Voice
                        </button>
                    </div>
                    
                    <div class="voice-section">
                        <h3>🎧 Voice Recognition</h3>
                        <p>Configure how EvolveAI listens to your voice commands and conversations.</p>
                        
                        <div class="form-group">
                            <label>Wake Word</label>
                            <input type="text" id="wake-word" value="Hey Evolve" placeholder="e.g., Hey Evolve">
                        </div>
                        
                        <div class="form-group">
                            <label>Voice Sensitivity</label>
                            <input type="range" id="voice-sensitivity" min="0.1" max="1.0" step="0.1" value="0.7">
                            <span id="sensitivity-value">70%</span>
                        </div>
                        
                        <div class="form-group">
                            <label>Auto-Listen Mode</label>
                            <select id="auto-listen">
                                <option value="manual">Manual (click to listen)</option>
                                <option value="wake-word">Wake Word Only</option>
                                <option value="continuous">Continuous Listening</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="voice-enabled" onchange="toggleVoice()">
                                Enable Voice Interaction
                            </label>
                        </div>
                    </div>
                </div>
            `,
            
            installation: `
                <div class="installation-content">
                    <div class="installation-section">
                        <h3>🔑 Google AI Studio Setup</h3>
                        <p>Configure your Google AI Studio API key for cloud-based AI interactions.</p>
                        
                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="google-api-key" placeholder="Enter your Google AI Studio API key">
                            <button class="btn btn-secondary" onclick="testGoogleAPI()" style="margin-top: 10px;">
                                Test Connection
                            </button>
                        </div>
                        
                        <div id="api-test-result" class="hidden"></div>
                    </div>
                    
                    <div class="installation-section">
                        <h3>🏠 Local AI Models</h3>
                        <p>Install local AI models for privacy-focused and offline interactions.</p>
                        
                        <button class="btn btn-primary" onclick="installOllama()" id="install-ollama-btn">
                            Install Ollama
                        </button>
                        
                        <div id="ollama-progress" class="hidden">
                            <div class="progress-bar">
                                <div class="progress-fill" id="ollama-progress-fill" style="width: 0%"></div>
                            </div>
                            <p id="ollama-status">Preparing installation...</p>
                        </div>
                        
                        <div id="model-selection" class="hidden">
                            <h4>Select Models to Install</h4>
                            <div class="model-grid" id="model-grid">
                                <!-- Models will be populated -->
                            </div>
                        </div>
                    </div>
                </div>
            `,
            
            finish: `
                <div class="finish-content">
                    <h2>🎉 Setup Complete!</h2>
                    <p>Your personalized EvolveAI experience is ready to use.</p>
                    
                    <div class="next-steps-grid">
                        <div class="step-card">
                            <h4>🚀 Start Chatting</h4>
                            <p>Begin your first conversation with your personalized AI assistants</p>
                        </div>
                        <div class="step-card">
                            <h4>🎭 Try Voice</h4>
                            <p>Test voice interaction with "Hey Evolve" or click the microphone</p>
                        </div>
                        <div class="step-card">
                            <h4>⚙️ Customize More</h4>
                            <p>Fine-tune settings and add custom APIs in the Settings panel</p>
                        </div>
                        <div class="step-card">
                            <h4>📚 Learn More</h4>
                            <p>Explore advanced features and join the community</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 30px;">
                        <h3>Your Configuration Summary</h3>
                        <div id="config-summary" style="text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; margin-top: 15px;">
                            <!-- Configuration summary will be populated -->
                        </div>
                    </div>
                </div>
            `
        };

        // Initialize the wizard
        document.addEventListener('DOMContentLoaded', function() {
            loadStep(0);
            loadSystemInfo();
        });

        function loadStep(step) {
            currentStep = step;
            
            // Update step indicator
            document.querySelectorAll('.step').forEach((s, index) => {
                s.classList.remove('active', 'completed');
                if (index < step) {
                    s.classList.add('completed');
                } else if (index === step) {
                    s.classList.add('active');
                }
            });
            
            // Update content
            const contentDiv = document.getElementById('content');
            const stepKeys = ['welcome', 'personality', 'useCase', 'voice', 'installation', 'finish'];
            contentDiv.innerHTML = stepContent[stepKeys[step]];
            
            // Update navigation
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.style.display = step === 0 ? 'none' : 'inline-block';
            nextBtn.textContent = step === 5 ? 'Finish' : 'Next';
            
            // Update title and subtitle
            const titles = [
                'Welcome to EvolveAI',
                'Configure Your AI Personalities',
                'How Will You Use EvolveAI?',
                'Voice Interaction Setup',
                'Installation & Configuration',
                'Setup Complete!'
            ];
            
            const subtitles = [
                'Let\'s configure your AI experience',
                'Customize how your AIs behave and communicate',
                'Tell us about your primary use case',
                'Set up voice interaction capabilities',
                'Install and configure AI models',
                'You\'re ready to start using EvolveAI!'
            ];
            
            document.getElementById('step-title').textContent = titles[step];
            document.getElementById('step-subtitle').textContent = subtitles[step];
            
            // Load step-specific data
            if (step === 4) {
                loadRecommendedModels();
            } else if (step === 5) {
                loadConfigSummary();
            }
        }

        async function loadSystemInfo() {
            try {
                const systemInfo = await window.electronAPI.getSystemInfo();
                const grid = document.getElementById('system-info-grid');
                if (grid) {
                    grid.innerHTML = `
                        <div class="info-item">
                            <div class="label">Operating System</div>
                            <div class="value">${systemInfo.os}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Architecture</div>
                            <div class="value">${systemInfo.architecture}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">RAM</div>
                            <div class="value">${systemInfo.ram} GB</div>
                        </div>
                        <div class="info-item">
                            <div class="label">CPU Cores</div>
                            <div class="value">${systemInfo.cpu.cores}</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load system info:', error);
            }
        }

        function updateGeminiPersonality() {
            config.geminiPersonality.name = document.getElementById('gemini-name').value;
            config.geminiPersonality.communicationStyle = document.getElementById('gemini-style').value;
            config.geminiPersonality.background = document.getElementById('gemini-background').value;
        }

        function updateGeminiTraits() {
            const checkboxes = document.querySelectorAll('#gemini-name').closest('.ai-section').querySelectorAll('.trait-checkbox input:checked');
            config.geminiPersonality.traits = Array.from(checkboxes).map(cb => cb.value);
        }

        function updateLocalPersonality() {
            config.localLLMPersonality.name = document.getElementById('local-name').value;
            config.localLLMPersonality.communicationStyle = document.getElementById('local-style').value;
            config.localLLMPersonality.background = document.getElementById('local-background').value;
        }

        function updateLocalTraits() {
            const checkboxes = document.querySelectorAll('#local-name').closest('.ai-section').querySelectorAll('.trait-checkbox input:checked');
            config.localLLMPersonality.traits = Array.from(checkboxes).map(cb => cb.value);
        }

        function selectUseCase(useCase) {
            config.primaryUseCase = useCase;
            document.querySelectorAll('.use-case-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`[data-use-case="${useCase}"]`).classList.add('selected');
        }

        function selectVoiceProvider(provider) {
            config.voiceProvider = provider;
            document.querySelectorAll('.voice-option').forEach(option => {
                option.classList.remove('selected');
            });
            event.target.closest('.voice-option').classList.add('selected');
        }

        function toggleVoice() {
            config.voiceEnabled = document.getElementById('voice-enabled').checked;
        }

        async function testGoogleAPI() {
            const apiKey = document.getElementById('google-api-key').value;
            if (!apiKey) {
                alert('Please enter an API key first');
                return;
            }
            
            const result = await window.electronAPI.testGoogleAPI(apiKey);
            const resultDiv = document.getElementById('api-test-result');
            resultDiv.innerHTML = `
                <div style="padding: 10px; margin-top: 10px; border-radius: 8px; background: ${result.success ? '#d4edda' : '#f8d7da'}; color: ${result.success ? '#155724' : '#721c24'};">
                    ${result.message}
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        async function installOllama() {
            const btn = document.getElementById('install-ollama-btn');
            const progress = document.getElementById('ollama-progress');
            
            btn.disabled = true;
            btn.textContent = 'Installing...';
            progress.classList.remove('hidden');
            
            try {
                const result = await window.electronAPI.installOllama();
                if (result.success) {
                    document.getElementById('ollama-status').textContent = 'Ollama installed successfully!';
                    document.getElementById('model-selection').classList.remove('hidden');
                } else {
                    document.getElementById('ollama-status').textContent = `Installation failed: ${result.error}`;
                }
            } catch (error) {
                document.getElementById('ollama-status').textContent = 'Installation failed';
            }
        }

        async function loadRecommendedModels() {
            try {
                const models = await window.electronAPI.getRecommendedModels();
                const grid = document.getElementById('model-grid');
                grid.innerHTML = models.map(model => `
                    <div class="model-card" onclick="toggleModel('${model.name}')">
                        <h4>${model.name}</h4>
                        <p>${model.description}</p>
                        <div class="size">${model.size}GB • ${model.minRAM}GB RAM</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load models:', error);
            }
        }

        function toggleModel(modelName) {
            const index = config.selectedModels.indexOf(modelName);
            if (index > -1) {
                config.selectedModels.splice(index, 1);
            } else {
                config.selectedModels.push(modelName);
            }
            
            // Update visual selection
            const card = event.target.closest('.model-card');
            card.classList.toggle('selected');
        }

        function loadConfigSummary() {
            const summary = document.getElementById('config-summary');
            summary.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <h4>🤖 AI Personalities</h4>
                        <p><strong>Google AI:</strong> ${config.geminiPersonality.name} (${config.geminiPersonality.communicationStyle})</p>
                        <p><strong>Local AI:</strong> ${config.localLLMPersonality.name} (${config.localLLMPersonality.communicationStyle})</p>
                    </div>
                    <div>
                        <h4>🎯 Use Case</h4>
                        <p><strong>Primary:</strong> ${config.primaryUseCase}</p>
                        <p><strong>Voice:</strong> ${config.voiceEnabled ? 'Enabled' : 'Disabled'}</p>
                    </div>
                </div>
            `;
        }

        async function nextStep() {
            if (currentStep < 5) {
                loadStep(currentStep + 1);
            } else {
                // Save configuration and finish
                try {
                    await window.electronAPI.saveConfig(config);
                    window.close();
                } catch (error) {
                    alert('Failed to save configuration: ' + error.message);
                }
            }
        }

        function previousStep() {
            if (currentStep > 0) {
                loadStep(currentStep - 1);
            }
        }

        // Voice test functionality
        function testVoice() {
            // This would integrate with the actual voice system
            alert('Voice test functionality will be implemented with the voice system');
        }

        // Update range value displays
        document.addEventListener('input', function(e) {
            if (e.target.id === 'voice-speed') {
                document.getElementById('speed-value').textContent = e.target.value + 'x';
            } else if (e.target.id === 'voice-volume') {
                document.getElementById('volume-value').textContent = Math.round(e.target.value * 100) + '%';
            } else if (e.target.id === 'voice-sensitivity') {
                document.getElementById('sensitivity-value').textContent = Math.round(e.target.value * 100) + '%';
            }
        });
    </script>
</body>
</html>
